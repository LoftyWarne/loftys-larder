# Fly.io app config for Lofty's Larder.
#
# Per DEC-63 / DEC-64: single region `lhr`, Fly auto-stop, no always-on machine.

app = "loftys-larder-prod"
primary_region = "lhr"

[build]
  # Multi-stage Dockerfile in the repo root.
  dockerfile = "Dockerfile"

# Migrations run as a Fly release command on every deploy (DEC-40, DEC-65).
# There is no `flyctl deploy --release-command` flag; this is the only place
# Fly reads it. The release machine boots the runtime image and runs the
# bundled migrate entrypoint (drizzle-orm's programmatic migrator, DEC-61)
# before the new version goes live — prod never needs drizzle-kit. The
# reference seed runs right after (idempotent, `ON CONFLICT DO NOTHING`); `&&`
# means it only runs if migration succeeds.
[deploy]
  release_command = "node /app/migrate.js && node /app/seed-reference.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

# Machine-level TCP liveness probe.
#
# FEAT-46 introduces `/api/health`; at that point swap this for an HTTP check
# (or keep both). Declaring an HTTP check that points at a non-existent route
# now would mark every machine unhealthy through FEAT-06 deployment.
[checks]
  [checks.tcp_alive]
    type = "tcp"
    port = 3000
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
